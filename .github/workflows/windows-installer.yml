name: Windows Installer

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1  # v1

      - name: Install Qt6
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730  # v4.3.1
        with:
          version: '6.8.*'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtmultimedia qtserialport qtwebsockets qtshadertools'

      - name: Install Ninja, Inno Setup, and LLVM
        run: choco install ninja innosetup llvm -y

      - name: Cache Opus
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        id: cache-opus
        with:
          path: MasterSDR/third_party/opus
          key: opus-${{ runner.os }}-${{ hashFiles('MasterSDR/setup-opus.ps1') }}

      - name: Setup Opus (SmartLink audio codec)
        if: steps.cache-opus.outputs.cache-hit != 'true'
        working-directory: MasterSDR
        run: .\setup-opus.ps1

      - name: Cache FFTW3
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        id: cache-fftw
        with:
          path: MasterSDR/third_party/fftw3
          key: fftw-${{ runner.os }}-${{ hashFiles('MasterSDR/setup-fftw.ps1') }}

      - name: Setup FFTW3 float (NR4 dependency)
        if: steps.cache-fftw.outputs.cache-hit != 'true'
        working-directory: MasterSDR
        run: .\setup-fftw.ps1

      - name: Cache hidapi
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        id: cache-hidapi
        with:
          path: MasterSDR/third_party/hidapi
          key: hidapi-${{ runner.os }}-${{ hashFiles('MasterSDR/setup-hidapi.ps1') }}

      - name: Setup hidapi (USB HID device support)
        if: steps.cache-hidapi.outputs.cache-hit != 'true'
        working-directory: MasterSDR
        run: .\setup-hidapi.ps1

      - name: Cache DeepFilterNet3
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        id: cache-deepfilter
        with:
          path: MasterSDR/third_party/deepfilter
          key: deepfilter-${{ runner.os }}-v2-${{ hashFiles('MasterSDR/setup-deepfilter.ps1') }}

      - name: Setup DeepFilterNet3 (DFNR)
        if: steps.cache-deepfilter.outputs.cache-hit != 'true'
        working-directory: MasterSDR
        run: .\setup-deepfilter.ps1

      - name: Configure
        working-directory: MasterSDR
        run: |
          cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DMQTT_TLS=OFF -DENABLE_DFNR=OFF

      - name: Build Opus (RADE dependency)
        working-directory: MasterSDR
        run: cmake --build build --target build_opus -j $env:NUMBER_OF_PROCESSORS

      - name: Build
        working-directory: MasterSDR
        run: cmake --build build -j $env:NUMBER_OF_PROCESSORS

      - name: Deploy Qt
        working-directory: MasterSDR
        run: |
          mkdir deploy
          copy build\MasterSDR.exe deploy\
          windeployqt deploy\MasterSDR.exe --release --no-translations --no-system-d3d-compiler
          if (Test-Path "third_party\fftw3\bin\libfftw3-3.dll") {
            copy third_party\fftw3\bin\libfftw3-3.dll deploy\
          }
          if (Test-Path "third_party\fftw3\bin\libfftw3f-3.dll") {
            copy third_party\fftw3\bin\libfftw3f-3.dll deploy\
          }
          if (Test-Path "third_party\hidapi\bin\hidapi.dll") {
            copy third_party\hidapi\bin\hidapi.dll deploy\
          }
          if (Test-Path "third_party\deepfilter\lib\windows-x86_64\deepfilter.dll") {
            copy third_party\deepfilter\lib\windows-x86_64\deepfilter.dll deploy\
          }
          if (Test-Path "third_party\deepfilter\models\DeepFilterNet3_onnx.tar.gz") {
            copy third_party\deepfilter\models\DeepFilterNet3_onnx.tar.gz deploy\
          }

      - name: Stage MSVC runtime for installer
        working-directory: MasterSDR
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File packaging\windows\stage-msvc-runtime.ps1 -OutputDir installer-runtime

      - name: Create portable ZIP
        working-directory: MasterSDR
        run: |
          Copy-Item -Path installer-runtime\*.dll -Destination deploy\ -Force
          Compress-Archive -Path deploy\* -DestinationPath "..\MasterSDR-${{ github.ref_name }}-Windows-x64-portable.zip"

      - name: Create installer (Inno Setup)
        working-directory: MasterSDR
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $runtimeDir = (Resolve-Path "installer-runtime").Path
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAPP_VERSION=$version "/DVC_RUNTIME_DIR=$runtimeDir" packaging\windows\installer.iss
          Move-Item "packaging\windows\Output\*.exe" ".."

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: Windows-Installer
          path: |
            MasterSDR-*.zip
            MasterSDR-*-setup.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3
        with:
          files: |
            MasterSDR-*.zip
            MasterSDR-*-setup.exe
