name: Stream Deck Plugins

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  upload-plugins:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Package Elgato plugin
        run: |
          cd MasterSDR/plugins/elgato-mastersdr
          zip -r ../../com.mastersdr.radio.streamDeckPlugin com.mastersdr.radio.sdPlugin/

      - name: Package StreamController plugin
        run: |
          cd MasterSDR/plugins
          zip -r ../streamcontroller-mastersdr.zip streamcontroller-mastersdr/ \
            -x "*/__pycache__/*"

      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          # Wait for the release to exist (created by maintainer or another workflow)
          for i in $(seq 1 30); do
            if gh release view "$TAG" >/dev/null 2>&1; then
              break
            fi
            echo "Waiting for release $TAG to be created... ($i/30)"
            sleep 10
          done
          # Create a draft release if it still doesn't exist
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --notes "Release $TAG" --draft
          fi
          gh release upload "$TAG" \
            com.mastersdr.radio.streamDeckPlugin \
            streamcontroller-mastersdr.zip \
            --clobber
